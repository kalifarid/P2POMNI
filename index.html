<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>P2POMNI - GLOBAL P2P BRIDGE</title>
    <!-- Tailwind CSS və FontAwesome İkonları -->
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <!-- PeerJS Kitabxanası (P2P Bağlantı üçün) -->
    <script src="https://unpkg.com/peerjs@1.4.7/dist/peerjs.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&family=Rajdhani:wght@500;700&display=swap');
        .cyber-font { font-family: 'Rajdhani', sans-serif; }
        .cyber-glow { text-shadow: 0 0 10px rgba(6, 182, 212, 0.7); }
        .cyber-panel { background: rgba(15, 23, 42, 0.85); backdrop-filter: blur(12px); border: 1px solid rgba(6, 182, 212, 0.2); }
        body { background: radial-gradient(circle at center, #0f172a 0%, #020617 100%); min-height: 100vh; overflow-x: hidden; }
        video { transform: scaleX(-1); object-fit: cover; }
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: #020617; }
        ::-webkit-scrollbar-thumb { background: #06b6d4; border-radius: 3px; }
    </style>
</head>
<body class="cyber-font text-slate-100 antialiased">

    <!-- TOP NAVIGATION & LANGUAGE CHANGER -->
    <header class="w-full border-b border-cyan-500/20 bg-slate-950/80 backdrop-blur sticky top-0 z-50 px-6 py-4 flex justify-between items-center">
        <div class="flex items-center space-x-3">
            <div class="h-10 w-10 rounded-lg bg-gradient-to-br from-cyan-500 to-blue-600 flex items-center justify-center shadow-[0_0_15px_rgba(6,182,212,0.4)]">
                <i class="fa-solid fa-circle-nodes text-xl text-white animate-pulse"></i>
            </div>
            <div>
                <h1 class="text-2xl font-bold tracking-wider text-transparent bg-clip-text bg-gradient-to-r from-cyan-400 to-blue-500 cyber-glow">P2POMNI</h1>
                <p class="text-xs text-cyan-400/70 uppercase tracking-widest hidden sm:block">Global P2P Bridge</p>
            </div>
        </div>

        <!-- Dil Bayraqları -->
        <div class="flex items-center space-x-2 bg-slate-900/90 border border-slate-700/50 p-1.5 rounded-xl">
            <button onclick="changeLanguage('en')" class="lang-btn px-2.5 py-1 rounded-md text-sm transition font-bold border border-transparent hover:border-cyan-500/40" id="btn-en" title="English">🇺🇸 EN</button>
            <button onclick="changeLanguage('az')" class="lang-btn px-2.5 py-1 rounded-md text-sm transition font-bold border border-transparent hover:border-cyan-500/40" id="btn-az" title="Azərbaycanca">🇦🇿 AZ</button>
            <button onclick="changeLanguage('tr')" class="lang-btn px-2.5 py-1 rounded-md text-sm transition font-bold border border-transparent hover:border-cyan-500/40" id="btn-tr" title="Türkçe">🇹🇷 TR</button>
            <button onclick="changeLanguage('ru')" class="lang-btn px-2.5 py-1 rounded-md text-sm transition font-bold border border-transparent hover:border-cyan-500/40" id="btn-ru" title="Русский">🇷🇺 RU</button>
            <button onclick="changeLanguage('zh')" class="lang-btn px-2.5 py-1 rounded-md text-sm transition font-bold border border-transparent hover:border-cyan-500/40" id="btn-zh" title="中文">🇨🇳 ZH</button>
        </div>
    </header>

    <!-- MAIN APP WRAPPER -->
    <main class="max-w-7xl mx-auto p-4 sm:p-6 lg:p-8">

        <!-- LOBBY SCREEN (OTAQ YARATMA VƏ DAXİL OLMA) -->
        <div id="lobby-screen" class="max-w-2xl mx-auto my-12 space-y-8 animate-fade-in">
            <div class="text-center space-y-3">
                <h2 id="lang-welcome" class="text-4xl font-bold tracking-tight text-white sm:text-5xl">Təhlükəsiz Qlobal P2P Şəbəkəsi</h2>
                <p id="lang-subwelcome" class="text-lg text-slate-400">Heç bir server yaddaşı olmadan, birbaşa cihazlar arası şifrələnmiş video və səs otaqları.</p>
            </div>

            <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                <!-- Otaq Yarat panel -->
                <div class="cyber-panel p-6 rounded-2xl flex flex-col justify-between space-y-4">
                    <div>
                        <div class="flex items-center space-x-2 text-cyan-400 font-bold text-lg mb-3">
                            <i class="fa-solid fa-plus-circle"></i>
                            <span id="lang-create-title">Yeni Otaq Yarat</span>
                        </div>
                        <label id="lang-label-limit" class="block text-sm text-slate-400 mb-2">Maksimum İştirakçı Sayı (Özünüzdən başqa):</label>
                        <input type="number" id="room-limit-input" min="1" max="10" value="4" class="w-full bg-slate-950 border border-slate-700 rounded-xl px-4 py-2.5 text-cyan-400 focus:outline-none focus:border-cyan-500 font-bold text-center">
                    </div>
                    <button onclick="createNewRoom()" class="w-full bg-gradient-to-r from-cyan-500 to-blue-600 hover:from-cyan-400 hover:to-blue-500 text-white font-bold py-3 px-4 rounded-xl transition shadow-lg shadow-cyan-500/20 active:scale-95">
                        <span id="lang-btn-create">Otağı Başlat</span>
                    </button>
                </div>

                <!-- Otağa Qoşul panel -->
                <div class="cyber-panel p-6 rounded-2xl flex flex-col justify-between space-y-4">
                    <div>
                        <div class="flex items-center space-x-2 text-emerald-400 font-bold text-lg mb-3">
                            <i class="fa-solid fa-right-to-bracket"></i>
                            <span id="lang-join-title">Mövcud Otağa Qoşul</span>
                        </div>
                        <label id="lang-label-code" class="block text-sm text-slate-400 mb-2">Otaq Kodunu Daxil Edin:</label>
                        <input type="text" id="room-id-input" placeholder="p2p-xxxx-xxxx" class="w-full bg-slate-950 border border-slate-700 rounded-xl px-4 py-2.5 text-slate-200 focus:outline-none focus:border-cyan-500 tracking-wider text-center">
                    </div>
                    <button onclick="joinRoomDirect()" class="w-full bg-slate-800 hover:bg-slate-700 text-emerald-400 border border-emerald-500/30 font-bold py-3 px-4 rounded-xl transition active:scale-95">
                        <span id="lang-btn-join">Qoşul</span>
                    </button>
                </div>
            </div>
        </div>

        <!-- ACTIVE CHAT INTERFACE (OTAQ EKRAI) -->
        <div id="room-screen" class="hidden space-y-6 animate-fade-in">
            <!-- STATUS BAR -->
            <div class="cyber-panel px-6 py-3 rounded-2xl flex flex-wrap justify-between items-center gap-4">
                <div class="flex items-center space-x-4">
                    <span class="flex h-3 w-3 relative">
                        <span class="animate-ping absolute inline-flex h-full w-full rounded-full bg-emerald-400 opacity-75"></span>
                        <span class="relative inline-flex rounded-full h-3 w-3 bg-emerald-500"></span>
                    </span>
                    <div class="text-sm">
                        <span id="lang-status-connected" class="text-slate-400">Otaq Kodu:</span>
                        <span id="current-room-display" class="font-bold text-cyan-400 tracking-wider ml-1">---</span>
                    </div>
                </div>

                <!-- Limit və İştirakçı Göstəricisi -->
                <div class="flex items-center space-x-4">
                    <div class="bg-slate-950 border border-slate-800 px-3 py-1.5 rounded-xl text-xs">
                        <span id="lang-slot-label" class="text-slate-400">İştirakçılar:</span>
                        <span id="participant-count" class="font-bold text-white ml-1">1</span> / <span id="room-limit-display" class="font-bold text-cyan-400">--</span>
                    </div>
                    <button onclick="copyRoomLink()" class="bg-slate-800 hover:bg-cyan-600/20 text-cyan-400 px-4 py-1.5 rounded-xl text-xs border border-cyan-500/20 transition flex items-center space-x-2">
                        <i class="fa-solid fa-copy"></i>
                        <span id="lang-btn-copy">Kodu Kopyala</span>
                    </button>
                </div>
            </div>

            <!-- GRID MEDIA WALL -->
            <div class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-4" id="video-grid">
                <!-- Local video container -->
                <div class="relative bg-slate-950 rounded-2xl overflow-hidden border border-cyan-500/30 group aspect-video shadow-xl" id="local-video-card">
                    <video id="local-video" autoplay playsinline muted class="w-full h-full"></video>
                    <div class="absolute bottom-3 left-3 bg-slate-900/80 backdrop-blur px-3 py-1 rounded-lg text-xs font-bold text-cyan-400 border border-cyan-500/20">
                        <span id="lang-you-label">Siz (Sahib)</span>
                    </div>
                    <!-- Status İkonları overlay -->
                    <div class="absolute top-3 right-3 flex space-x-2">
                        <div id="status-mic-off" class="hidden h-7 w-7 rounded-full bg-red-500/80 flex items-center justify-center text-white text-xs"><i class="fa-solid fa-microphone-slash"></i></div>
                        <div id="status-cam-off" class="hidden h-7 w-7 rounded-full bg-red-500/80 flex items-center justify-center text-white text-xs"><i class="fa-solid fa-video-slash"></i></div>
                    </div>
                </div>
            </div>

            <!-- CONTROL PANEL -->
            <div class="flex justify-center items-center space-x-4 py-4">
                <!-- Səs aç/bağla -->
                <button onclick="toggleAudio()" id="btn-toggle-audio" class="h-14 w-14 rounded-full bg-cyan-600 hover:bg-cyan-500 text-white flex items-center justify-center transition-all shadow-lg active:scale-95 text-lg">
                    <i class="fa-solid fa-microphone" id="icon-audio"></i>
                </button>
                <!-- Kamera aç/bağla -->
                <button onclick="toggleVideo()" id="btn-toggle-video" class="h-14 w-14 rounded-full bg-cyan-600 hover:bg-cyan-500 text-white flex items-center justify-center transition-all shadow-lg active:scale-95 text-lg">
                    <i class="fa-solid fa-video" id="icon-video"></i>
                </button>
                <!-- Otaqdan çıx -->
                <button onclick="leaveRoom()" id="btn-leave" class="h-14 w-16 rounded-2xl bg-red-600 hover:bg-red-500 text-white flex items-center justify-center transition-all shadow-lg active:scale-95 text-lg border border-red-500/30" title="Leave">
                    <i class="fa-solid fa-phone-slash"></i>
                </button>
            </div>
        </div>
    </main>

    <!-- NOTIFICATION SYSTEM -->
    <div id="toast-container" class="fixed bottom-6 right-6 z-50 space-y-2"></div>

    <!-- MAIN CORE LOGIC SCRIPT -->
    <script>
        // LOKALİZASİYA DATA LÜĞƏTİ
        const dictionary = {
            en: {
                welcome: "Secure Global P2P Networking",
                subwelcome: "Encrypted P2P room infrastructure directly between browser nodes.",
                createTitle: "Create Premium Room",
                labelLimit: "Max Connected Guests (excluding you):",
                btnCreate: "Launch Infrastructure",
                joinTitle: "Join Existing Room",
                labelCode: "Enter Secure Token/ID:",
                btnJoin: "Establish Bridge",
                connected: "Secure Mesh Token:",
                slotLabel: "Nodes:",
                btnCopy: "Copy ID",
                youLabel: "You (Local Node)",
                toastCopy: "Room Token copied to clipboard!",
                toastMax: "Room full status reached!",
                toastJoin: "New peer connected to structural mesh.",
                toastLeave: "A peer disconnected from current mesh."
            },
            az: {
                welcome: "Təhlükəsiz Qlobal P2P Şəbəkəsi",
                subwelcome: "Heç bir server yaddaşı olmadan, birbaşa cihazlar arası şifrələnmiş video otaqlar.",
                createTitle: "Yeni Otaq Yarat",
                labelLimit: "Maksimum İştirakçı Sayı (Özünüzdən başqa):",
                btnCreate: "Otağı Başlat",
                joinTitle: "Mövcud Otağa Qoşul",
                labelCode: "Otaq Kodunu Daxil Edin:",
                btnJoin: "Qoşul",
                connected: "Otaq Kodu:",
                slotLabel: "İştirakçılar:",
                btnCopy: "Kodu Kopyala",
                youLabel: "Siz (Sahib)",
                toastCopy: "Otaq kodu mübadilə yaddaşına kopyalandı!",
                toastMax: "Otaq limiti dolub! Giriş rədd edildi.",
                toastJoin: "Yeni istifadəçi şəbəkəyə qoşuldu.",
                toastLeave: "İstifadəçi otaqdan ayrıldı."
            },
            tr: {
                welcome: "Güvenli Küresel P2P Ağ Bağlantısı",
                subwelcome: "Sunucu depolaması olmadan, tarayıcı düğümleri arasında doğrudan şifreli odalar.",
                createTitle: "Yeni Oda Oluştur",
                labelLimit: "Maksimum Katılımcı Sayısı (Siz hariç):",
                btnCreate: "Odayı Başlat",
                joinTitle: "Mevcut Odaya Katıl",
                labelCode: "Oda Kodunu Girin:",
                btnJoin: "Bağlantı Kur",
                connected: "Oda Kodu:",
                slotLabel: "Katılımcı:",
                btnCopy: "Kodu Kopyala",
                youLabel: "Siz (Sahip)",
                toastCopy: "Oda kodu panoya kopyalandı!",
                toastMax: "Oda maksimum kapasiteye ulaştı!",
                toastJoin: "Yeni bir kullanıcı odaya giriş yaptı.",
                toastLeave: "Bir kullanıcı odadan ayrıldı."
            },
            ru: {
                welcome: "Безопасная Глобальная P2P Сеть",
                subwelcome: "Зашифрованная медиа-структура напрямую между браузерами без хранения на сервере.",
                createTitle: "Создать Комнату",
                labelLimit: "Макс. гостей (не включая вас):",
                btnCreate: "Запустить Сессию",
                joinTitle: "Подключиться к Комнате",
                labelCode: "Введите уникальный код/токен:",
                btnJoin: "Подключиться",
                connected: "Токен Комнаты:",
                slotLabel: "Участники:",
                btnCopy: "Копировать код",
                youLabel: "Вы (Организатор)",
                toastCopy: "Код комнаты скопирован в буфер обмена!",
                toastMax: "Достигнут лимит участников в комнате!",
                toastJoin: "Новый участник подключился к узлу.",
                toastLeave: "Участник отключился от сессии."
            },
            zh: {
                welcome: "安全全球 P2P 网络",
                subwelcome: "浏览器节点之间直接建立加密的端到端音视频聊天房间。",
                createTitle: "创建新房间",
                labelLimit: "最大允许访客数（不包含自己）:",
                btnCreate: "启动网桥",
                joinTitle: "加入现有房间",
                labelCode: "输入房间安全令牌/ID:",
                btnJoin: "建立连接",
                connected: "房间令牌:",
                slotLabel: "当前节点数:",
                btnCopy: "复制 ID",
                youLabel: "您（本地节点）",
                toastCopy: "房间代码已复制到剪贴板！",
                toastMax: "房间已满！无法加入。",
                toastJoin: "新用户已成功连接至网桥。",
                toastLeave: "用户已从当前网桥断开连接。"
            }
        };

        let currentLang = 'en';
        let localStream = null;
        let peer = null;
        let currentRoomId = null;
        let roomMaxLimit = 4;
        let connectedPeers = {}; // {peerId: callObject}
        let activeConnections = {}; // {peerId: dataConnectionObject}

        // DİL DEYİŞDİRMƏ SİSTEMİ
        function changeLanguage(lang) {
            currentLang = lang;
            document.querySelectorAll('.lang-btn').forEach(btn => {
                btn.classList.remove('bg-cyan-500', 'text-slate-950', 'border-cyan-500');
                btn.classList.add('text-slate-100', 'border-transparent');
            });
            const activeBtn = document.getElementById(`btn-${lang}`);
            if(activeBtn) {
                activeBtn.classList.add('bg-cyan-500', 'text-slate-950', 'border-cyan-500');
            }

            // Mətnlərin renderi
            document.getElementById('lang-welcome').innerText = dictionary[lang].welcome;
            document.getElementById('lang-subwelcome').innerText = dictionary[lang].subwelcome;
            document.getElementById('lang-create-title').innerText = dictionary[lang].createTitle;
            document.getElementById('lang-label-limit').innerText = dictionary[lang].labelLimit;
            document.getElementById('lang-btn-create').innerText = dictionary[lang].btnCreate;
            document.getElementById('lang-join-title').innerText = dictionary[lang].joinTitle;
            document.getElementById('lang-label-code').innerText = dictionary[lang].labelCode;
            document.getElementById('lang-btn-join').innerText = dictionary[lang].btnJoin;
            document.getElementById('lang-status-connected').innerText = dictionary[lang].connected;
            document.getElementById('lang-slot-label').innerText = dictionary[lang].slotLabel;
            document.getElementById('lang-btn-copy').innerText = dictionary[lang].btnCopy;
            document.getElementById('lang-you-label').innerText = dictionary[lang].youLabel;
        }

        // INITIALIZE APP
        window.addEventListener('DOMContentLoaded', () => {
            changeLanguage('en');
            // Əgər URL-də birbaşa otaq kodu gəlibsə avtomatik inputa yerləşdir
            const urlParams = new URLSearchParams(window.location.search);
            const roomParam = urlParams.get('room');
            if(roomParam) {
                document.getElementById('room-id-input').value = roomParam;
            }
        });

        // TOAST NOTIFICATION GENERATOR
        function showToast(messageKey) {
            const container = document.getElementById('toast-container');
            const msg = dictionary[currentLang][messageKey] || messageKey;
            const toast = document.createElement('div');
            toast.className = "bg-slate-900 border border-cyan-500/30 text-slate-200 px-4 py-3 rounded-xl shadow-2xl flex items-center space-x-2 text-sm animate-bounce";
            toast.innerHTML = `<i class="fa-solid fa-bell text-cyan-400"></i> <span>${msg}</span>`;
            container.appendChild(toast);
            setTimeout(() => toast.remove(), 4000);
        }

        // MEDIA STREAM INITIALIZER
        async function initMedia() {
            if (!localStream) {
                try {
                    localStream = await navigator.mediaDevices.getUserMedia({ video: true, audio: true });
                    document.getElementById('local-video').srcObject = localStream;
                } catch (err) {
                    console.error("Media access denied:", err);
                    // Əgər kamera yoxdursa yalnız audio və ya dummy stream yoxla
                    localStream = new MediaStream();
                }
            }
        }

        // GENERIC PEER CONFIGURATION
        function setupPeer(targetId = null) {
            return new Promise((resolve) => {
                // Stabil işləmək üçün qlobal ümumi cloud PeerJS serverindən istifadə olunur
                peer = new Peer(targetId, {
                    debug: 1,
                    config: {
                        iceServers: [
                            { urls: 'stun:stun.l.google.com:19302' },
                            { urls: 'stun:stun1.l.google.com:19302' },
                            { urls: 'stun:stun2.l.google.com:19302' }
                        ]
                    }
                });

                peer.on('open', (id) => {
                    resolve(id);
                });

                peer.on('error', (err) => {
                    console.error("P2P Mesh Error:", err.type);
                    if(err.type === 'unavailable-id') {
                        alert("Room serialization conflict. Retrying setup.");
                    }
                });
            });
        }

        // CREATE ROOM ROUTINE
        async function createNewRoom() {
            roomMaxLimit = parseInt(document.getElementById('room-limit-input').value) || 4;
            await initMedia();

            // Unikal təmiz otaq strukturu generatası p2p-xxxx
            const generatedRoomId = 'p2p-' + Math.random().toString(36).substring(2, 6) + '-' + Math.random().toString(36).substring(2, 6);
            
            await setupPeer(generatedRoomId);
            currentRoomId = generatedRoomId;

            document.getElementById('room-limit-display').innerText = roomMaxLimit + 1; // +1 özü daxil
            executeRoomTransition();

            // Gələn qoşulma sorğularını qəbul etmək
            peer.on('connection', (conn) => {
                handleIncomingDataConnection(conn);
            });

            peer.on('call', (call) => {
                // Sahibin otağında cari say limitini yoxla
                const totalActive = Object.keys(connectedPeers).length + 1;
                if(totalActive >= (roomMaxLimit + 1)) {
                    // Limiti keçibsə rədd et, data connection ilə imtina göndər
                    return;
                }
                call.answer(localStream);
                handleIncomingCall(call);
            });
        }

        // JOIN DIRECT VIA CODE
        async function joinRoomDirect() {
            const targetRoomId = document.getElementById('room-id-input').value.trim();
            if(!targetRoomId) return;

            await initMedia();
            await setupPeer(); // Avtomatik random ID ilə öz peer-ini quraşdırır

            currentRoomId = targetRoomId;
            executeRoomTransition();

            // Əvvəlcə otaq sahibinə data kanalı açırıq ki limit yoxlanılsın
            const dataConn = peer.connect(targetRoomId);
            handleIncomingDataConnection(dataConn);

            // Zəng et
            const call = peer.call(targetRoomId, localStream);
            handleIncomingCall(call);

            peer.on('call', (incomingCall) => {
                incomingCall.answer(localStream);
                handleIncomingCall(incomingCall);
            });
            
            peer.on('connection', (conn) => {
                handleIncomingDataConnection(conn);
            });
        }

        // UI TRANSITION SETUP
        function executeRoomTransition() {
            document.getElementById('lobby-screen').classList.add('hidden');
            document.getElementById('room-screen').classList.remove('hidden');
            document.getElementById('current-room-display').innerText = currentRoomId;
            updateParticipantUI();
        }

        // HOOK DATA CHANNELS
        function handleIncomingDataConnection(conn) {
            activeConnections[conn.peer] = conn;
            conn.on('data', (data) => {
                if(data.type === 'room-meta') {
                    // Host-dan gələn limit datasını tətbiq et
                    roomMaxLimit = data.limit;
                    document.getElementById('room-limit-display').innerText = roomMaxLimit + 1;
                }
                if(data.type === 'rejected-full') {
                    alert(dictionary[currentLang].toastMax);
                    leaveRoom();
                }
                if(data.type === 'sync-status') {
                    toggleRemoteStatusIndicators(conn.peer, data.mediaType, data.enabled);
                }
            });

            conn.on('open', () => {
                // Əgər otaq sahibiyiksə, qoşulana limit məlumatlarını ötürək
                if(peer.id === currentRoomId) {
                    const totalActive = Object.keys(connectedPeers).length + 1;
                    if(totalActive > (roomMaxLimit + 1)) {
                        conn.send({type: 'rejected-full'});
                        return;
                    }
                    conn.send({type: 'room-meta', limit: roomMaxLimit});
                    // Digər otaq iştirakçılarını da yeni gələnə ötürmək zəncirvari P2P şəbəkəsi qurur (Full Mesh)
                    broadcastToAll({type: 'update-mesh'});
                }
            });
        }

        // HOOK MEDIA CALLS
        function handleIncomingCall(call) {
            connectedPeers[call.peer] = call;
            
            call.on('stream', (remoteStream) => {
                injectRemoteVideo(call.peer, remoteStream);
            });

            call.on('close', () => {
                removeRemoteVideo(call.peer);
            });

            updateParticipantUI();
            showToast('toastJoin');
        }

        // INJECT VIDEO ELEMENT TO MESH GRID
        function injectRemoteVideo(peerId, stream) {
            if(document.getElementById(`card-${peerId}`)) return;

            const grid = document.getElementById('video-grid');
            const card = document.createElement('div');
            card.id = `card-${peerId}`;
            card.className = "relative bg-slate-950 rounded-2xl overflow-hidden border border-slate-800 group aspect-video shadow-xl";
            
            const video = document.createElement('video');
            video.srcObject = stream;
            video.autoplay = true;
            video.playsinline = true;
            video.className = "w-full h-full";

            const label = document.createElement('div');
            label.className = "absolute bottom-3 left-3 bg-slate-900/80 backdrop-blur px-3 py-1 rounded-lg text-xs font-bold text-slate-300 border border-slate-700/50";
            label.innerText = `Peer [${peerId.substring(4, 8)}]`;

            // Remote Status Overlays
            const overlay = document.createElement('div');
            overlay.className = "absolute top-3 right-3 flex space-x-2";
            overlay.innerHTML = `
                <div id="mic-${peerId}" class="hidden h-7 w-7 rounded-full bg-red-500/80 flex items-center justify-center text-white text-xs"><i class="fa-solid fa-microphone-slash"></i></div>
                <div id="cam-${peerId}" class="hidden h-7 w-7 rounded-full bg-red-500/80 flex items-center justify-center text-white text-xs"><i class="fa-solid fa-video-slash"></i></div>
            `;

            card.appendChild(video);
            card.appendChild(label);
            card.appendChild(overlay);
            grid.appendChild(card);
            
            updateParticipantUI();
        }

        // REMOVE FROM MESH
        function removeRemoteVideo(peerId) {
            const card = document.getElementById(`card-${peerId}`);
            if(card) card.remove();
            if(connectedPeers[peerId]) delete connectedPeers[peerId];
            if(activeConnections[peerId]) delete activeConnections[peerId];
            updateParticipantUI();
            showToast('toastLeave');
        }

        // MULTICAST DATA PACKETS
        function broadcastToAll(packet) {
            Object.values(activeConnections).forEach(conn => {
                if(conn.open) conn.send(packet);
            });
        }

        // COUNTER SYNCHRONIZATION
        function updateParticipantUI() {
            const count = Object.keys(connectedPeers).length + 1;
            document.getElementById('participant-count').innerText = count;
        }

        // REMOTE AUDIO/VIDEO VISUAL STATE MANAGER
        function toggleRemoteStatusIndicators(peerId, mediaType, isEnabled) {
            const indicator = document.getElementById(`${mediaType === 'audio' ? 'mic' : 'cam'}-${peerId}`);
            if(indicator) {
                if(isEnabled) indicator.classList.add('hidden');
                else indicator.classList.remove('hidden');
            }
        }

        // AUDIO TOGGLE (MUTE/UNMUTE)
        function toggleAudio() {
            if(!localStream) return;
            const audioTrack = localStream.getAudioTracks()[0];
            if(audioTrack) {
                audioTrack.enabled = !audioTrack.enabled;
                const icon = document.getElementById('icon-audio');
                const btn = document.getElementById('btn-toggle-audio');
                const indicator = document.getElementById('status-mic-off');

                if(audioTrack.enabled) {
                    icon.className = "fa-solid fa-microphone";
                    btn.className = "h-14 w-14 rounded-full bg-cyan-600 hover:bg-cyan-500 text-white flex items-center justify-center transition-all shadow-lg text-lg";
                    indicator.classList.add('hidden');
                } else {
                    icon.className = "fa-solid fa-microphone-slash";
                    btn.className = "h-14 w-14 rounded-full bg-red-600 hover:bg-red-500 text-white flex items-center justify-center transition-all shadow-lg text-lg";
                    indicator.classList.remove('hidden');
                }
                broadcastToAll({type: 'sync-status', mediaType: 'audio', enabled: audioTrack.enabled});
            }
        }

        // VIDEO TOGGLE (ON/OFF)
        function toggleVideo() {
            if(!localStream) return;
            const videoTrack = localStream.getVideoTracks()[0];
            if(videoTrack) {
                videoTrack.enabled = !videoTrack.enabled;
                const icon = document.getElementById('icon-video');
                const btn = document.getElementById('btn-toggle-video');
                const indicator = document.getElementById('status-cam-off');

                if(videoTrack.enabled) {
                    icon.className = "fa-solid fa-video";
                    btn.className = "h-14 w-14 rounded-full bg-cyan-600 hover:bg-cyan-500 text-white flex items-center justify-center transition-all shadow-lg text-lg";
                    indicator.classList.add('hidden');
                } else {
                    icon.className = "fa-solid fa-video-slash";
                    btn.className = "h-14 w-14 rounded-full bg-red-600 hover:bg-red-500 text-white flex items-center justify-center transition-all shadow-lg text-lg";
                    indicator.classList.remove('hidden');
                }
                broadcastToAll({type: 'sync-status', mediaType: 'video', enabled: videoTrack.enabled});
            }
        }

        // UTILITY: UTILS TO COPY LINK
        function copyRoomLink() {
            if(!currentRoomId) return;
            const link = window.location.origin + window.location.pathname + '?room=' + currentRoomId;
            navigator.clipboard.writeText(link).then(() => {
                showToast('toastCopy');
            });
        }

        // DISCONNECT ROUTINE
        function leaveRoom() {
            if(localStream) {
                localStream.getTracks().forEach(track => track.stop());
                localStream = null;
            }
            if(peer) {
                peer.destroy();
            }
            // Səhifəni tam ilkin vəziyyətinə sıfırla
            window.location.href = window.location.origin + window.location.pathname;
        }
    </script>
</body>
</html>
