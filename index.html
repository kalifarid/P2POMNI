<!DOCTYPE html>
<html lang="az">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>P2POmni — Global P2P Bridge</title>
    <style>
        :root {
            --bg-color: #0b0f19;
            --panel-bg: #131c2e;
            --accent-color: #00ffcc;
            --accent-hover: #00d4aa;
            --text-color: #ffffff;
            --text-muted: #8a99ad;
            --danger: #ff4a5a;
            --danger-hover: #e03b4a;
            --success: #2ec4b6;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-color);
            display: flex;
            flex-direction: column;
            min-height: 100vh;
            overflow-x: hidden;
        }

        header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 20px 40px;
            background: rgba(19, 28, 46, 0.8);
            backdrop-filter: blur(10px);
            border-bottom: 1px solid rgba(0, 255, 204, 0.1);
            position: sticky;
            top: 0;
            z-index: 100;
        }

        .logo {
            font-size: 24px;
            font-weight: 800;
            letter-spacing: 2px;
            color: var(--text-color);
        }

        .logo span {
            color: var(--accent-color);
            text-shadow: 0 0 10px rgba(0, 255, 204, 0.5);
        }

        .lang-selector {
            display: flex;
            gap: 12px;
        }

        .flag-btn {
            font-size: 24px;
            background: none;
            border: 2px solid transparent;
            cursor: pointer;
            border-radius: 50%;
            transition: all 0.3s ease;
            padding: 2px;
            line-height: 1;
        }

        .flag-btn:hover, .flag-btn.active {
            border-color: var(--accent-color);
            transform: scale(1.15);
            box-shadow: 0 0 8px rgba(0, 255, 204, 0.4);
        }

        main {
            flex: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 30px;
            max-width: 1400px;
            width: 100%;
            margin: 0 auto;
        }

        .setup-container {
            background: var(--panel-bg);
            border: 1px solid rgba(255, 255, 255, 0.05);
            border-radius: 16px;
            padding: 40px;
            width: 100%;
            max-width: 500px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.5);
            text-align: center;
        }

        .setup-container h2 {
            margin-bottom: 25px;
            font-size: 26px;
            font-weight: 600;
        }

        .input-group {
            margin-bottom: 20px;
            text-align: left;
        }

        .input-group label {
            display: block;
            margin-bottom: 8px;
            color: var(--text-muted);
            font-size: 14px;
        }

        .input-group input, .input-group select {
            width: 100%;
            padding: 14px;
            background: rgba(0, 0, 0, 0.2);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 8px;
            color: #fff;
            font-size: 16px;
            transition: all 0.3s;
        }

        .input-group input:focus, .input-group select:focus {
            border-color: var(--accent-color);
            outline: none;
            box-shadow: 0 0 10px rgba(0, 255, 204, 0.2);
        }

        .btn {
            width: 100%;
            padding: 15px;
            background: var(--accent-color);
            color: #000;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.3s ease;
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-top: 10px;
        }

        .btn:hover {
            background: var(--accent-hover);
            box-shadow: 0 0 15px rgba(0, 255, 204, 0.4);
            transform: translateY(-2px);
        }

        .workspace {
            display: none;
            width: 100%;
            grid-template-columns: 1fr 350px;
            gap: 25px;
            height: calc(100vh - 160px);
        }

        .video-grid-container {
            display: flex;
            flex-direction: column;
            background: rgba(19, 28, 46, 0.5);
            border-radius: 16px;
            padding: 20px;
            border: 1px solid rgba(255, 255, 255, 0.05);
            position: relative;
        }

        .room-info-bar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: rgba(0,0,0,0.3);
            padding: 12px 20px;
            border-radius: 8px;
            margin-bottom: 15px;
            font-size: 14px;
        }

        .video-streams {
            flex: 1;
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 15px;
            align-content: center;
            justify-content: center;
        }

        .video-wrapper {
            background: #000;
            border-radius: 12px;
            overflow: hidden;
            position: relative;
            aspect-ratio: 16/9;
            border: 2px solid rgba(255, 255, 255, 0.1);
        }

        .video-wrapper.local-stream {
            border-color: var(--accent-color);
        }

        video {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .stream-labels {
            position: absolute;
            bottom: 10px;
            left: 10px;
            background: rgba(0,0,0,0.6);
            padding: 4px 10px;
            border-radius: 4px;
            font-size: 12px;
            backdrop-filter: blur(4px);
        }

        .controls {
            position: absolute;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%);
            display: flex;
            gap: 15px;
            background: rgba(19, 28, 46, 0.9);
            padding: 12px 25px;
            border-radius: 30px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(10px);
        }

        .control-btn {
            width: 48px;
            height: 48px;
            border-radius: 50%;
            border: none;
            background: rgba(255, 255, 255, 0.1);
            color: #fff;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.3s;
            font-size: 18px;
        }

        .control-btn:hover {
            background: rgba(255, 255, 255, 0.2);
            transform: scale(1.05);
        }

        .control-btn.muted {
            background: var(--danger);
        }

        .control-btn.muted:hover {
            background: var(--danger-hover);
        }

        .signal-panel {
            background: var(--panel-bg);
            border-radius: 16px;
            border: 1px solid rgba(255, 255, 255, 0.05);
            display: flex;
            flex-direction: column;
            padding: 20px;
        }

        .panel-title {
            font-size: 16px;
            font-weight: 600;
            margin-bottom: 15px;
            padding-bottom: 10px;
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
            color: var(--accent-color);
        }

        .signal-box {
            flex: 1;
            background: rgba(0,0,0,0.2);
            border-radius: 8px;
            padding: 15px;
            font-family: monospace;
            font-size: 12px;
            color: var(--text-muted);
            overflow-y: auto;
            margin-bottom: 15px;
            word-break: break-all;
        }

        .signal-input-area textarea {
            width: 100%;
            height: 80px;
            background: rgba(0, 0, 0, 0.3);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 8px;
            color: #fff;
            padding: 10px;
            font-size: 13px;
            resize: none;
            margin-bottom: 10px;
        }

        .signal-btn {
            width: 100%;
            padding: 10px;
            background: transparent;
            border: 1px solid var(--accent-color);
            color: var(--accent-color);
            border-radius: 6px;
            cursor: pointer;
            font-weight: 600;
            transition: all 0.3s;
        }

        .signal-btn:hover {
            background: var(--accent-color);
            color: #000;
        }

        .status-badge {
            display: inline-block;
            padding: 3px 8px;
            border-radius: 4px;
            font-size: 11px;
            font-weight: bold;
            background: var(--danger);
            color: #fff;
        }

        .status-badge.connected {
            background: var(--success);
        }
    </style>
</head>
<body>

    <header>
        <div class="logo">P2P<span>OMNI BRIDGE</span></div>
        <div class="lang-selector">
            <button class="flag-btn active" onclick="switchLanguage('az')" title="Azərbaycanca">🇦🇿</button>
            <button class="flag-btn" onclick="switchLanguage('tr')" title="Türkçe">🇹🇷</button>
            <button class="flag-btn" onclick="switchLanguage('en')" title="English">🇺🇸</button>
            <button class="flag-btn" onclick="switchLanguage('ru')" title="Русский">🇷🇺</button>
            <button class="flag-btn" onclick="switchLanguage('zh')" title="中文">🇨🇳</button>
        </div>
    </header>

    <main>
        <div class="setup-container" id="setupPanel">
            <h2 id="txtSetupTitle">Körpü Yaradın və ya Qoşulun</h2>
            
            <div class="input-group">
                <label id="lblRoomAction">Bağlantı növü</label>
                <select id="roomAction" onchange="toggleSetupMode()">
                    <option value="create" id="optCreate">Yeni P2P Körpü Yarat (Host)</option>
                    <option value="join" id="optJoin">Mövcud P2P Körpüyə Qoşul (Peer)</option>
                </select>
            </div>

            <div class="input-group" id="limitGroup">
                <label id="lblLimit">Maksimum İştirakçı Sayı (Sizdən başqa)</label>
                <select id="peerLimit">
                    <option value="1">1</option>
                    <option value="2">2</option>
                    <option value="3">3</option>
                    <option value="5">5</option>
                </select>
            </div>

            <div class="input-group" id="roomKeyGroup" style="display: none;">
                <label id="lblRoomKey">Körpü ID / Siqnal Şifrəsi</label>
                <input type="text" id="roomKeyInput" placeholder="Qarşı tərəfin siqnal kodunu bura yapışdırın...">
            </div>

            <button class="btn" id="btnAction" onclick="initializeP2P()">Körpünü Başlat</button>
        </div>

        <div class="workspace" id="mainWorkspace">
            <div class="video-grid-container">
                <div class="room-info-bar">
                    <div>Status: <span id="statusBadge" class="status-badge">Yaradılır...</span></div>
                    <div><span id="txtRoomLimitLabel">Bağlantı Limiti:</span> <span id="currentLimitDisplay" style="color:var(--accent-color); font-weight:bold;">-</span></div>
                </div>

                <div class="video-streams" id="videoGrid">
                    <div class="video-wrapper local-stream">
                        <video id="localVideo" autoplay playsinline muted></video>
                        <div class="stream-labels" id="lblLocalVideo">Siz (Kamera)</div>
                    </div>
                    <div class="video-wrapper" id="remoteVideoWrapper" style="display: none;">
                        <video id="remoteVideo" autoplay playsinline></video>
                        <div class="stream-labels" id="lblRemoteVideo">Uzaq İstifadəçi</div>
                    </div>
                </div>

                <div class="controls">
                    <button class="control-btn" id="toggleMic" onclick="toggleAudio()" title="Mikrofon">🎤</button>
                    <button class="control-btn" id="toggleCam" onclick="toggleVideo()" title="Kamera">📷</button>
                    <button class="control-btn" id="leaveRoom" onclick="location.reload()" title="Çıxış" style="background:var(--danger)">❌</button>
                </div>
            </div>

            <div class="signal-panel">
                <div class="panel-title" id="txtSignalTitle">P2P Siqnal Mübadiləsi</div>
                <div class="signal-box" id="signalStatus">Sistem başladılır...</div>
                
                <div class="signal-input-area">
                    <textarea id="signalDataOutput" readonly placeholder="Sizin siqnal kodunuz burada yaranacaq..."></textarea>
                    <button class="signal-btn" id="btnCopySignal" onclick="copySignalCode()">Kodu Kopyala</button>
                </div>

                <div class="signal-input-area" style="margin-top: 15px;">
                    <textarea id="signalDataInput" placeholder="Qarşı tərəfdən gələn cavab kodunu bura yapışdırın..."></textarea>
                    <button class="signal-btn" id="btnConnectSignal" onclick="processInputSignal()">Bağlantını Tamayla</button>
                </div>
            </div>
        </div>
    </main>

    <script>
        const languages = {
            az: {
                setupTitle: "Körpü Yaradın və ya Qoşulun",
                roomAction: "Bağlantı növü",
                optCreate: "Yeni P2P Körpü Yarat (Host)",
                optJoin: "Mövcud P2P Körpüyə Qoşul (Peer)",
                limit: "Maksimum İştirakçı Sayı (Sizdən başqa)",
                roomKey: "Körpü ID / Siqnal Şifrəsi",
                btnStart: "Körpünü Başlat",
                btnJoin: "Körpüyə Qoşul",
                localVideo: "Siz (Kamera)",
                remoteVideo: "Uzaq İstifadəçi",
                signalTitle: "P2P Siqnal Mübadiləsi",
                statusWaiting: "Qarşı tərəfin qoşulması gözlənilir...",
                statusConnected: "Qoşuldu",
                statusDisconnected: "Bağlantı kəsildi",
                copyBtn: "Kodu Kopyala",
                connectBtn: "Bağlantını Tamayla",
                roomLimit: "Bağlantı Limiti",
                alertCopy: "Siqnal kodu panoya kopyalandı! Dostunuza göndərin.",
                alertSignal: "Zəhmət olmasa siqnal kodunu daxil edin."
            },
            tr: {
                setupTitle: "Köprü Oluşturun veya Katılın",
                roomAction: "Bağlantı türü",
                optCreate: "Yeni P2P Köprü Oluştur (Host)",
                optJoin: "Mevcut P2P Köprüye Katıl (Peer)",
                limit: "Maksimum Katılımcı Sayısı (Sizden hariç)",
                roomKey: "Köprü Kimliği / Sinyal Şifresi",
                btnStart: "Köprüyü Başlat",
                btnJoin: "Köprüye Katıl",
                localVideo: "Siz (Kamera)",
                remoteVideo: "Uzak Kullanıcı",
                signalTitle: "P2P Sinyal Alışverişi",
                statusWaiting: "Karşı tarafın bağlanması bekleniyor...",
                statusConnected: "Bağlandı",
                statusDisconnected: "Bağlantı Kesildi",
                copyBtn: "Kodu Kopyala",
                connectBtn: "Bağlantıyı Tamamla",
                roomLimit: "Bağlantı Limiti",
                alertCopy: "Sinyal kodu panoya kopyalandı! Arkadaşınıza gönderin.",
                alertSignal: "Lütfen sinyal kodunu girin."
            },
            en: {
                setupTitle: "Create or Join a Bridge",
                roomAction: "Connection Type",
                optCreate: "Create New P2P Bridge (Host)",
                optJoin: "Join Existing P2P Bridge (Peer)",
                limit: "Maximum Participants (Excluding you)",
                roomKey: "Bridge ID / Signal Key",
                btnStart: "Start Bridge",
                btnJoin: "Join Bridge",
                localVideo: "You (Camera)",
                remoteVideo: "Remote Peer",
                signalTitle: "P2P Signaling Exchange",
                statusWaiting: "Waiting for peer connection...",
                statusConnected: "Connected",
                statusDisconnected: "Disconnected",
                copyBtn: "Copy Code",
                connectBtn: "Complete Connection",
                roomLimit: "Bridge Limit",
                alertCopy: "Signal code copied to clipboard! Send it to your peer.",
                alertSignal: "Please enter the signal code."
            },
            ru: {
                setupTitle: "Создать или Подключить Мост",
                roomAction: "Тип соединения",
                optCreate: "Создать новый P2P Мост (Хост)",
                optJoin: "Подключиться к P2P Мосту (Пир)",
                limit: "Макс. участников (Кроме вас)",
                roomKey: "ID Моста / Ключ Сигнала",
                btnStart: "Запустить Мост",
                btnJoin: "Подключиться к Мосту",
                localVideo: "Вы (Камера)",
                remoteVideo: "Удаленный пользователь",
                signalTitle: "P2P Обмен Сигналами",
                statusWaiting: "Ожидание подключения пира...",
                statusConnected: "Подключено",
                statusDisconnected: "Отключено",
                copyBtn: "Копировать код",
                connectBtn: "Завершить соединение",
                roomLimit: "Лимит Моста",
                alertCopy: "Сигнальный код скопирован! Отправьте его другу.",
                alertSignal: "Пожалуйста, введите сигнальный код."
            },
            zh: {
                setupTitle: "创建或加入 P2P 网桥",
                roomAction: "连接类型",
                optCreate: "创建新 P2P 网桥 (主方)",
                optJoin: "加入现有 P2P 网桥 (客方)",
                limit: "最大参与人数 (不 include 你)",
                roomKey: "网桥 ID / 信号密钥",
                btnStart: "启动网桥",
                btnJoin: "加入网桥",
                localVideo: "您 (摄像头)",
                remoteVideo: "远程用户",
                signalTitle: "P2P 信号交换",
                statusWaiting: "等待对端连接...",
                statusConnected: "已连接",
                statusDisconnected: "断开连接",
                copyBtn: "复制专属代码",
                connectBtn: "完成 P2P 连接",
                roomLimit: "网桥限制",
                alertCopy: "信号代码已复制到剪贴板！请发送给朋友。",
                alertSignal: "请输入有效的信号代码。"
            }
        };

        let currentLang = 'az';
        let localStream;
        let peerConnection;
        let isHost = true;

        const configuration = {
            iceServers: [
                { urls: 'stun:stun.l.google.com:19302' },
                { urls: 'stun:stun1.l.google.com:19302' }
            ]
        };

        function switchLanguage(lang) {
            currentLang = lang;
            document.querySelectorAll('.flag-btn').forEach(btn => btn.classList.remove('active'));
            event.target.classList.add('active');

            document.getElementById('txtSetupTitle').innerText = languages[lang].setupTitle;
            document.getElementById('lblRoomAction').innerText = languages[lang].roomAction;
            document.getElementById('optCreate').innerText = languages[lang].optCreate;
            document.getElementById('optJoin').innerText = languages[lang].optJoin;
            document.getElementById('lblLimit').innerText = languages[lang].limit;
            document.getElementById('lblRoomKey').innerText = languages[lang].roomKey;
            
            const actionBtn = document.getElementById('btnAction');
            actionBtn.innerText = document.getElementById('roomAction').value === 'create' ? languages[lang].btnStart : languages[lang].btnJoin;

            document.getElementById('lblLocalVideo').innerText = languages[lang].localVideo;
            document.getElementById('lblRemoteVideo').innerText = languages[lang].remoteVideo;
            document.getElementById('txtSignalTitle').innerText = languages[lang].signalTitle;
            document.getElementById('btnCopySignal').innerText = languages[lang].copyBtn;
            document.getElementById('btnConnectSignal').innerText = languages[lang].connectBtn;
            document.getElementById('txtRoomLimitLabel').innerText = languages[lang].roomLimit;
        }

        function toggleSetupMode() {
            const action = document.getElementById('roomAction').value;
            const limitGroup = document.getElementById('limitGroup');
            const roomKeyGroup = document.getElementById('roomKeyGroup');
            const actionBtn = document.getElementById('btnAction');

            if (action === 'create') {
                isHost = true;
                limitGroup.style.display = 'block';
                roomKeyGroup.style.display = 'none';
                actionBtn.innerText = languages[currentLang].btnStart;
            } else {
                isHost = false;
                limitGroup.style.display = 'none';
                roomKeyGroup.style.display = 'block';
                actionBtn.innerText = languages[currentLang].btnJoin;
            }
        }

        function toggleAudio() {
            const audioTrack = localStream.getAudioTracks()[0];
            if (audioTrack) {
                audioTrack.enabled = !audioTrack.enabled;
                document.getElementById('toggleMic').classList.toggle('muted', !audioTrack.enabled);
                document.getElementById('toggleMic').innerText = audioTrack.enabled ? "🎤" : "🔇";
            }
        }

        function toggleVideo() {
            const videoTrack = localStream.getVideoTracks()[0];
            if (videoTrack) {
                videoTrack.enabled = !videoTrack.enabled;
                document.getElementById('toggleCam').classList.toggle('muted', !videoTrack.enabled);
                document.getElementById('toggleCam').innerText = videoTrack.enabled ? "📷" : "🚫";
            }
        }

        async function initializeP2P() {
            const limit = document.getElementById('peerLimit').value;
            document.getElementById('currentLimitDisplay').innerText = isHost ? limit : "1";

            try {
                localStream = await navigator.mediaDevices.getUserMedia({ video: true, audio: true });
                document.getElementById('localVideo').srcObject = localStream;
            } catch (err) {
                alert("Kamera və ya mikrofona giriş icazəsi verilmədi!");
                return;
            }

            document.getElementById('setupPanel').style.display = 'none';
            document.getElementById('mainWorkspace').style.display = 'grid';

            peerConnection = new RTCPeerConnection(configuration);

            localStream.getTracks().forEach(track => peerConnection.addTrack(track, localStream));

            peerConnection.ontrack = event => {
                document.getElementById('remoteVideoWrapper').style.display = 'block';
                document.getElementById('remoteVideo').srcObject = event.streams[0];
                updateStatus(languages[currentLang].statusConnected, true);
            };

            peerConnection.onicecandidate = event => {
                if (event.candidate == null) {
                    document.getElementById('signalDataOutput').value = JSON.stringify(peerConnection.localDescription);
                }
            };

            if (isHost) {
                updateStatus(languages[currentLang].statusWaiting, false);
                const offer = await peerConnection.createOffer();
                await peerConnection.setLocalDescription(offer);
            } else {
                updateStatus("Aktivləşdirilir...", false);
                const hostSignal = document.getElementById('roomKeyInput').value;
                if(hostSignal) {
                    document.getElementById('signalDataInput').value = hostSignal;
                }
            }
        }

        async function processInputSignal() {
            const signalText = document.getElementById('signalDataInput').value;
            if (!signalText) {
                alert(languages[currentLang].alertSignal);
                return;
            }

            const signal = JSON.parse(signalText);

            if (isHost) {
                await peerConnection.setRemoteDescription(new RTCSessionDescription(signal));
            } else {
                await peerConnection.setRemoteDescription(new RTCSessionDescription(signal));
                const answer = await peerConnection.createAnswer();
                await peerConnection.setLocalDescription(answer);
                document.getElementById('signalDataOutput').value = JSON.stringify(peerConnection.localDescription);
            }
        }

        function updateStatus(text, isConnected) {
            const badge = document.getElementById('statusBadge');
            const statusBox = document.getElementById('signalStatus');
            badge.innerText = text;
            statusBox.innerText = text;
            if(isConnected) {
                badge.classList.add('connected');
            } else {
                badge.classList.remove('connected');
            }
        }

        function copySignalCode() {
            const copyText = document.getElementById('signalDataOutput');
            copyText.select();
            copyText.setSelectionRange(0, 99999);
            navigator.clipboard.writeText(copyText.value);
            alert(languages[currentLang].alertCopy);
        }
    </script>
</body>
</html>
