<!DOCTYPE html>
<html lang="az" class="h-full">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>P2POMNI — Global P2P Bridge</title>
    <!-- Tailwind CSS və Google Fonts -->
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;700&family=Plus+Jakarta+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
    <!-- PeerJS Kitabxanası -->
    <script src="https://unpkg.com/peerjs@1.4.7/dist/peerjs.min.js"></script>
    
    <style>
        body {
            font-family: 'Plus Jakarta Sans', sans-serif;
            background: radial-gradient(circle at top right, #1a1a2e, #0f0f1b);
        }
        .code-font {
            font-family: 'JetBrains Mono', sans-serif;
        }
        /* Custom Scrollbar */
        ::-webkit-scrollbar {
            width: 6px;
            height: 6px;
        }
        ::-webkit-scrollbar-track {
            background: #111827;
        }
        ::-webkit-scrollbar-thumb {
            background: #374151;
            border-radius: 4px;
        }
        ::-webkit-scrollbar-thumb:hover {
            background: #4B5563;
        }
    </style>
</head>
<body class="h-full text-gray-100 flex flex-col overflow-hidden select-none">

    <!-- TOP NAVIGATION BAR -->
    <header class="bg-gray-900/80 backdrop-blur-md border-b border-gray-800 px-4 py-3 flex items-center justify-between z-50 shrink-0">
        <div class="flex items-center gap-3">
            <div class="w-10 h-10 rounded-xl bg-gradient-to-tr from-cyan-500 to-blue-600 flex items-center justify-center shadow-lg shadow-cyan-500/20">
                <span class="text-white font-bold text-xl tracking-tighter">Ω</span>
            </div>
            <div>
                <h1 class="font-bold text-lg leading-none tracking-wide bg-gradient-to-r from-white via-gray-200 to-gray-400 bg-clip-text text-transparent">P2POMNI</h1>
                <p class="text-[10px] text-cyan-400 font-medium tracking-widest uppercase mt-0.5">Global P2P Bridge</p>
            </div>
        </div>

        <!-- Language Flags Component -->
        <div class="flex items-center gap-1.5 bg-gray-950/60 p-1.5 rounded-xl border border-gray-800/80">
            <button onclick="changeLanguage('az')" class="lang-btn px-2 py-1 rounded-md text-xs transition-all font-semibold hover:bg-gray-800" data-lang="az">🇦🇿 AZ</button>
            <button onclick="changeLanguage('en')" class="lang-btn px-2 py-1 rounded-md text-xs transition-all font-semibold hover:bg-gray-800" data-lang="en">🇺🇸 EN</button>
            <button onclick="changeLanguage('tr')" class="lang-btn px-2 py-1 rounded-md text-xs transition-all font-semibold hover:bg-gray-800" data-lang="tr">🇹🇷 TR</button>
            <button onclick="changeLanguage('ru')" class="lang-btn px-2 py-1 rounded-md text-xs transition-all font-semibold hover:bg-gray-800" data-lang="ru">🇷🇺 RU</button>
            <button onclick="changeLanguage('zh')" class="lang-btn px-2 py-1 rounded-md text-xs transition-all font-semibold hover:bg-gray-800" data-lang="zh">🇨🇳 ZH</button>
        </div>
    </header>

    <!-- MAIN INTERFACE -->
    <main class="flex-1 flex flex-col md:flex-row min-h-0 relative">
        
        <!-- LOBBY / SETUP SCREEN -->
        <div id="lobbyScreen" class="absolute inset-0 z-40 bg-[#0f0f1b] flex items-center justify-center p-4 overflow-y-auto">
            <div class="w-full max-w-md bg-gray-900/50 backdrop-blur-xl border border-gray-800 rounded-2xl p-6 md:p-8 shadow-2xl">
                <div class="text-center mb-6">
                    <h2 id="txtLobbyTitle" class="text-2xl font-bold text-white mb-2">P2P Şəbəkəsinə Qoşulun</h2>
                    <p id="txtLobbyDesc" class="text-sm text-gray-400">Heç bir server qeydiyyatı olmadan birbaşa Peer-to-Peer bağlantı.</p>
                </div>

                <!-- Create Room Block -->
                <div class="space-y-4 mb-6">
                    <div class="bg-gray-950/40 border border-gray-800/60 rounded-xl p-4">
                        <label id="lblMaxUsers" class="block text-xs font-semibold text-gray-400 uppercase tracking-wider mb-2">Maksimum İştirakçı Sayı (Özünüzdən Başqa)</label>
                        <input type="number" id="maxUsersInput" value="5" min="1" max="20" class="w-full bg-gray-900 border border-gray-700 rounded-lg px-3 py-2 text-white text-sm focus:outline-none focus:border-cyan-500 transition-colors">
                        <button onclick="createRoom()" id="btnCreateRoom" class="w-full mt-3 bg-gradient-to-r from-cyan-500 to-blue-600 hover:from-cyan-600 hover:to-blue-700 text-white font-medium py-2.5 rounded-lg text-sm transition-all shadow-lg shadow-cyan-500/10">Yeni Otaq Yarat</button>
                    </div>
                </div>

                <div class="relative flex py-2 items-center justify-center mb-6">
                    <div class="border-t border-gray-800 flex-grow"></div>
                    <span id="txtOr" class="mx-3 text-xs text-gray-500 font-bold uppercase tracking-widest">və ya</span>
                    <div class="border-t border-gray-800 flex-grow"></div>
                </div>

                <!-- Join Room Block -->
                <div class="space-y-3">
                    <div>
                        <label id="lblRoomCode" class="block text-xs font-semibold text-gray-400 uppercase tracking-wider mb-2">Bağlantı Kodu / Otaq ID</label>
                        <input type="text" id="roomCodeInput" placeholder="Məs: omni-7a2c-9b8d" class="w-full bg-gray-900/60 border border-gray-800 rounded-lg px-3 py-2.5 text-white text-sm focus:outline-none focus:border-blue-500 transition-colors code-font">
                    </div>
                    <button onclick="joinRoom()" id="btnJoinRoom" class="w-full bg-gray-800 hover:bg-gray-700 text-gray-200 font-medium py-2.5 rounded-lg text-sm transition-all border border-gray-700/60">Otağa Qoşul</button>
                </div>
            </div>
        </div>

        <!-- CORE APPLICATION WORKSPACE (Hidden initially) -->
        <div id="appWorkspace" class="hidden flex-1 flex flex-col md:flex-row min-h-0 w-full">
            
            <!-- LEFT PANEL: VIDEOS & CONTROLS -->
            <div class="w-full md:w-[45%] lg:w-[40%] bg-gray-950/20 border-b md:border-b-0 md:border-r border-gray-800/80 flex flex-col min-h-0">
                
                <!-- Room Info / Header Info -->
                <div class="p-3 bg-gray-900/40 border-b border-gray-800/60 flex items-center justify-between shrink-0">
                    <div class="min-w-0">
                        <span id="txtActiveRoom" class="text-[10px] uppercase font-bold tracking-wider text-cyan-400 block">Aktiv Körpü</span>
                        <div class="flex items-center gap-2 mt-0.5">
                            <span id="displayRoomId" class="text-sm font-semibold text-white truncate code-font">---</span>
                            <button onclick="copyRoomId()" class="text-gray-400 hover:text-white transition-colors" title="Copy Link">
                                <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8 5H6a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2v-1M8 5a2 2 0 002 2h2a2 2 0 002-2M8 5a2 2 0 012-2h2a2 2 0 012 2m0 0h2a2 2 0 012 2v3m2 4H10m0 0l3-3m-3 3l3 3"></path></svg>
                            </button>
                        </div>
                    </div>
                    <div class="bg-gray-900 border border-gray-800 px-2.5 py-1 rounded-lg text-right">
                        <span id="txtUserCount" class="text-[10px] text-gray-400 block font-medium">İştirakçılar</span>
                        <span id="participantCount" class="text-xs font-bold text-emerald-400 code-font">1 / 1</span>
                    </div>
                </div>

                <!-- Video Grid Area -->
                <div id="videoGrid" class="flex-1 p-3 overflow-y-auto grid grid-cols-2 gap-2 auto-rows-max content-start bg-gray-900/10">
                    <!-- Local stream window -->
                    <div class="relative aspect-video bg-gray-950 rounded-xl overflow-hidden border border-cyan-500/30 group shadow-md shadow-black/40">
                        <video id="localVideo" autoplay muted playsinline class="w-full h-full object-cover"></video>
                        <div class="absolute bottom-2 left-2 bg-gray-900/80 backdrop-blur-md px-2 py-0.5 rounded text-[10px] font-medium border border-gray-700 text-cyan-400 z-10">
                            <span id="txtYou">Siz</span> (Local)
                        </div>
                    </div>
                </div>

                <!-- Media Controls Bar -->
                <div class="p-4 bg-gray-950/40 border-t border-gray-800/60 flex items-center justify-center gap-3 shrink-0">
                    <!-- Mic Toggle -->
                    <button onclick="toggleAudio()" id="micBtn" class="w-12 h-12 rounded-xl bg-gray-800 hover:bg-gray-700 text-white flex items-center justify-center transition-all border border-gray-700 shadow-md">
                        <svg class="w-5 h-5 fill-none stroke-current" viewBox="0 0 24 24" stroke-width="2"><path id="micIconPath" d="M12 1c-1.66 0-3 1.34-3 3v8c0 1.66 1.34 3 3 3s3-1.34 3-3V4c0-1.66-1.34-3-3-3z M19 10v1a7 7 0 0 1-14 0v-1 M12 19v4 M8 23h8"/></svg>
                    </button>
                    <!-- Cam Toggle -->
                    <button onclick="toggleVideo()" id="camBtn" class="w-12 h-12 rounded-xl bg-gray-800 hover:bg-gray-700 text-white flex items-center justify-center transition-all border border-gray-700 shadow-md">
                        <svg class="w-5 h-5 fill-none stroke-current" viewBox="0 0 24 24" stroke-width="2"><path id="camIconPath" d="M23 7l-7 5 7 5V7z M1 5h15v14H1z"/></svg>
                    </button>
                    <!-- Screen Share Toggle -->
                    <button onclick="toggleScreenShare()" id="screenBtn" class="w-12 h-12 rounded-xl bg-gray-800 hover:bg-gray-700 text-cyan-400 flex items-center justify-center transition-all border border-gray-700/60 shadow-md">
                        <svg class="w-5 h-5 fill-none stroke-current" viewBox="0 0 24 24" stroke-width="2"><rect x="2" y="3" width="20" height="14" rx="2" ry="2"/><path d="M8 21h8M12 17v4"/></svg>
                    </button>
                    <!-- Disconnect Button -->
                    <button onclick="disconnectCall()" id="btnExit" class="w-12 h-12 rounded-xl bg-red-600 hover:bg-red-700 text-white flex items-center justify-center transition-all shadow-lg shadow-red-600/20">
                        <svg class="w-5 h-5 fill-none stroke-current" viewBox="0 0 24 24" stroke-width="2"><path d="M17 16l4-4m0 0l-4-4m4 4H7m6 4v1a3 3 0 01-3 3H6a3 3 0 01-3-3V7a3 3 0 013-3h4a3 3 0 013 3v1"/></svg>
                    </button>
                </div>
            </div>

            <!-- RIGHT PANEL: CONTENT BRIDGE (CHATS & REAL-TIME CODES) -->
            <div class="flex-1 flex flex-col min-h-0 bg-[#12121e]">
                
                <!-- Tab Switching Structure -->
                <div class="flex bg-gray-900/60 border-b border-gray-800/80 p-1 shrink-0">
                    <button onclick="switchTab('chat')" id="tabChat" class="flex-1 py-2 text-center text-xs font-semibold rounded-lg transition-all text-white bg-gray-800">Chat Bridge</button>
                    <button onclick="switchTab('code')" id="tabCode" class="flex-1 py-2 text-center text-xs font-semibold rounded-lg transition-all text-gray-400 hover:text-white">Code Engine Bridge</button>
                </div>

                <!-- CHAT MODULE CONTAINER -->
                <div id="panelChat" class="flex-1 flex flex-col min-h-0">
                    <div id="chatMessageArea" class="flex-1 p-4 overflow-y-auto space-y-3 bg-gray-900/10">
                        <!-- System notifications and standard texts loaded here dynamically -->
                    </div>
                    <form id="chatInputForm" onsubmit="sendChatMessage(event)" class="p-3 bg-gray-950/40 border-t border-gray-800/80 flex items-center gap-2">
                        <input type="text" id="chatInputField" placeholder="Mesaj yazın..." autocomplete="off" class="flex-1 bg-gray-900/80 border border-gray-800 rounded-xl px-4 py-2.5 text-sm text-white focus:outline-none focus:border-cyan-500 transition-colors">
                        <button type="submit" class="bg-cyan-500 hover:bg-cyan-600 text-white px-4 py-2.5 rounded-xl transition-colors shrink-0">
                            <svg class="w-4 h-4 fill-current transform rotate-90" viewBox="0 0 24 24"><path d="M2 21l21-9L2 3v7l15 2-15 2v7z"/></svg>
                        </button>
                    </form>
                </div>

                <!-- CODE MODULE CONTAINER -->
                <div id="panelCode" class="hidden flex-1 flex flex-col min-h-0 bg-gray-950/40">
                    <div class="p-2.5 bg-gray-900/50 border-b border-gray-800 flex items-center justify-between shrink-0">
                        <span id="lblCodeLang" class="text-xs font-semibold tracking-wider text-gray-400 uppercase">Real-Time Sync Engine</span>
                        <span class="text-[10px] bg-cyan-500/10 text-cyan-400 px-2 py-0.5 rounded-md font-mono border border-cyan-500/20">Live P2P</span>
                    </div>
                    <textarea id="codeTextArea" oninput="broadcastCodeUpdate()" class="flex-1 bg-gray-900/30 p-4 code-font text-sm text-emerald-400 placeholder-gray-600 focus:outline-none resize-none leading-relaxed" placeholder="// Bura yazılan hər bir kod real vaxt rejimində qarşı tərəfdə dərhal görünəcək..."></textarea>
                </div>

            </div>
        </div>
    </main>

    <!-- REAL-TIME CORE ARCHITECTURE LOGIC ENGINE -->
    <script>
        // Multi-Language System Dataset
        const dictionary = {
            az: {
                title: "P2P Şəbəkəsinə Qoşulun",
                desc: "Heç bir server qeydiyyatı olmadan birbaşa Peer-to-Peer bağlantı.",
                lblMax: "Maksimum İştirakçı Sayı (Özünüzdən Başqa)",
                btnCreate: "Yeni Otaq Yarat",
                or: "və ya",
                lblCode: "Bağlantı Kodu / Otaq ID",
                btnJoin: "Otağa Qoşul",
                activeRoom: "Aktiv Körpü",
                users: "İştirakçılar",
                you: "Siz",
                chatPlaceholder: "Mesaj yazın...",
                codePlaceholder: "// Bura yazılan hər bir kod real vaxt rejimində qarşı tərəfdə dərhal görünəcək..."
            },
            en: {
                title: "Connect to P2P Network",
                desc: "Direct Peer-to-Peer connection without server registration.",
                lblMax: "Max Participants (Excluding You)",
                btnCreate: "Create New Room",
                or: "or",
                lblCode: "Connection Code / Room ID",
                btnJoin: "Join Existing Room",
                activeRoom: "Active Bridge ID",
                users: "Peers",
                you: "You",
                chatPlaceholder: "Type a message...",
                codePlaceholder: "// Any code typed here will instantly replicate across all peers in real-time..."
            },
            tr: {
                title: "P2P Ağma Bağlanın",
                desc: "Sunucu kaydı olmadan doğrudan Peer-to-Peer bağlantı.",
                lblMax: "Maksimum Katılımcı Sayısı (Siz Hariç)",
                btnCreate: "Yeni Oda Oluştur",
                or: "veya",
                lblCode: "Bağlantı Kodu / Oda ID",
                btnJoin: "Odaya Katıl",
                activeRoom: "Aktif Köprü",
                users: "Katılımcılar",
                you: "Siz",
                chatPlaceholder: "Bir mesaj yazın...",
                codePlaceholder: "// Buraya yazılan her kod gerçek zamanlı olarak tüm taraflarda anında görünecektir..."
            },
            ru: {
                title: "Подключение к сети P2P",
                desc: "Прямое соединение Peer-to-Peer без регистрации на сервере.",
                lblMax: "Макс. участников (кроме вас)",
                btnCreate: "Создать комнату",
                or: "или",
                lblCode: "Код подключения / ID комнаты",
                btnJoin: "Присоединиться",
                activeRoom: "Активный Мост",
                users: "Участники",
                you: "Вы",
                chatPlaceholder: "Введите сообщение...",
                codePlaceholder: "// Любой код, введенный здесь, мгновенно отобразится у всех участников..."
            },
            zh: {
                title: "连接到 P2P 网络",
                desc: "无需服务器注册的直接端到端连接。",
                lblMax: "最大参与人数（不包括您）",
                btnCreate: "创建新房间",
                or: "或",
                lblCode: "连接代码 / 房间 ID",
                btnJoin: "加入房间",
                activeRoom: "活动网桥",
                users: "在线节点",
                you: "您",
                chatPlaceholder: "输入消息...",
                codePlaceholder: "// 此处输入的任何代码都将在所有节点之间实时同步显示..."
            }
        };

        let currentLang = 'az';
        let peer = null;
        let localStream = null;
        let screenStream = null;
        let connections = [];
        let roomMaxPeers = 5;
        let activeRoomId = '';
        let isHost = false;

        // Change App Interface Language Language Dynamically
        function changeLanguage(lang) {
            currentLang = lang;
            document.querySelectorAll('.lang-btn').forEach(btn => {
                btn.classList.remove('bg-cyan-500', 'text-white');
                if(btn.getAttribute('data-lang') === lang) btn.classList.add('bg-cyan-500', 'text-white');
            });

            const d = dictionary[lang];
            document.getElementById('txtLobbyTitle').innerText = d.title;
            document.getElementById('txtLobbyDesc').innerText = d.desc;
            document.getElementById('lblMaxUsers').innerText = d.lblMax;
            document.getElementById('btnCreateRoom').innerText = d.btnCreate;
            document.getElementById('txtOr').innerText = d.or;
            document.getElementById('lblRoomCode').innerText = d.lblCode;
            document.getElementById('btnJoinRoom').innerText = d.btnJoin;
            document.getElementById('txtActiveRoom').innerText = d.activeRoom;
            document.getElementById('txtUserCount').innerText = d.users;
            document.getElementById('txtYou').innerText = d.you;
            document.getElementById('chatInputField').placeholder = d.chatPlaceholder;
            document.getElementById('codeTextArea').placeholder = d.codePlaceholder;
        }

        // Initialize Media Input Capture
        async function initMedia() {
            try {
                localStream = await navigator.mediaDevices.getUserMedia({ video: true, audio: true });
                document.getElementById('localVideo').srcObject = localStream;
            } catch (err) {
                console.error("Kamera/Mikrofon tapılmadı, yalnız səs rejimində və ya məhdud davam edilir.", err);
                localStream = new MediaStream();
            }
        }

        // Setup Peer Connection Engine
        function setupPeer(id = null) {
            return new Promise((resolve) => {
                peer = new Peer(id, {
                    host: '0.peerjs.com',
                    port: 443,
                    secure: true,
                    debug: 1
                });

                peer.on('open', (openedId) => {
                    resolve(openedId);
                });

                peer.on('call', (call) => {
                    // Automatically answer incoming calls with active media stream
                    call.answer(localStream);
                    call.on('stream', (remoteStream) => {
                        addRemoteVideo(call.peer, remoteStream);
                    });
                });

                peer.on('connection', (conn) => {
                    handleDataConnection(conn);
                });
            });
        }

        // Handle incoming data flows
        function handleDataConnection(conn) {
            connections.push(conn);
            updatePeerCount();

            conn.on('data', (data) => {
                if (data.type === 'chat') {
                    appendChatMessage(conn.peer.substring(0, 5), data.message, false);
                } else if (data.type === 'code') {
                    const el = document.getElementById('codeTextArea');
                    if(el.value !== data.code) el.value = data.code; // Sync text engine inside UI
                } else if (data.type === 'config' && !isHost) {
                    roomMaxPeers = data.max;
                    updatePeerCount();
                }
            });

            conn.on('close', () => {
                removeRemoteVideo(conn.peer);
                connections = connections.filter(c => c.peer !== conn.peer);
                updatePeerCount();
            });
        }

        // Create Secure Cryptographic Room
        async function createRoom() {
            await initMedia();
            isHost = true;
            roomMaxPeers = parseInt(document.getElementById('maxUsersInput').value) || 5;
            
            const randomId = 'omni-' + Math.random().toString(36).substring(2, 6) + '-' + Math.random().toString(36).substring(2, 6);
            activeRoomId = await setupPeer(randomId);

            document.getElementById('displayRoomId').innerText = activeRoomId;
            document.getElementById('lobbyScreen').classList.add('hidden');
            document.getElementById('appWorkspace').classList.remove('hidden');
            updatePeerCount();
            appendChatMessage("SYSTEM", "P2P Secure Bridge Established.", true);
        }

        // Join Existing Cryptographic Room Axis
        async function joinRoom() {
            const idInput = document.getElementById('roomCodeInput').value.trim();
            if(!idInput) return alert("Zəhmət olmasa düzgün otaq kodu daxil edin.");

            await initMedia();
            isHost = false;
            activeRoomId = idInput;
            
            await setupPeer(); // Auto assigned random client ID

            // Connect to host control entity
            const conn = peer.connect(activeRoomId);
            handleDataConnection(conn);

            // Call to stream data feed
            const call = peer.call(activeRoomId, localStream);
            call.on('stream', (remoteStream) => {
                addRemoteVideo(call.peer, remoteStream);
            });

            document.getElementById('displayRoomId').innerText = activeRoomId;
            document.getElementById('lobbyScreen').classList.add('hidden');
            document.getElementById('appWorkspace').classList.remove('hidden');
            updatePeerCount();
            appendChatMessage("SYSTEM", "Connected to Bridge Client.", true);
        }

        // Render Remote Participant Videos Safely
        function addRemoteVideo(peerId, stream) {
            if(document.getElementById('vid-' + peerId)) return;

            const grid = document.getElementById('videoGrid');
            const wrapper = document.createElement('div');
            wrapper.id = 'vid-' + peerId;
            wrapper.className = "relative aspect-video bg-gray-950 rounded-xl overflow-hidden border border-gray-800 group shadow-md";

            const video = document.createElement('video');
            video.srcObject = stream;
            video.autoplay = true;
            video.playsInline = true;
            video.className = "w-full h-full object-cover";

            const badge = document.createElement('div');
            badge.className = "absolute bottom-2 left-2 bg-gray-900/80 backdrop-blur-md px-2 py-0.5 rounded text-[10px] font-medium border border-gray-700 text-gray-300 z-10";
            badge.innerText = `Peer [${peerId.substring(0,5)}]`;

            wrapper.appendChild(video);
            wrapper.appendChild(badge);
            grid.appendChild(wrapper);
        }

        // Clear dynamic elements on disconnection
        function removeRemoteVideo(peerId) {
            const el = document.getElementById('vid-' + peerId);
            if(el) el.remove();
        }

        // Tracking Peer Connections Count Matrix
        function updatePeerCount() {
            const currentTotal = connections.length + 1; 
            document.getElementById('participantCount').innerText = `${currentTotal} / ${roomMaxPeers + 1}`;
            
            if (isHost) {
                connections.forEach(c => {
                    c.send({ type: 'config', max: roomMaxPeers });
                });
            }
        }

        // Live Chat Messaging Logic Engine
        function sendChatMessage(e) {
            e.preventDefault();
            const input = document.getElementById('chatInputField');
            const msg = input.value.trim();
            if(!msg) return;

            // Broadcast message frame to all peer pipes
            connections.forEach(c => {
                c.send({ type: 'chat', message: msg });
            });

            appendChatMessage("Siz", msg, false, true);
            input.value = '';
        }

        function appendChatMessage(sender, text, isSystem = false, isMe = false) {
            const container = document.getElementById('chatMessageArea');
            const div = document.createElement('div');
            
            if(isSystem) {
                div.className = "text-center text-[11px] font-semibold text-cyan-400 bg-cyan-950/20 py-1.5 px-3 rounded-lg border border-cyan-900/30 tracking-wide";
                div.innerText = text;
            } else {
                div.className = `flex flex-col max-w-[85%] ${isMe ? 'ml-auto items-end' : 'mr-auto items-start'}`;
                div.innerHTML = `
                    <span class="text-[10px] text-gray-500 mb-0.5 font-medium px-1">${sender}</span>
                    <div class="p-2.5 rounded-xl text-sm leading-relaxed border ${isMe ? 'bg-cyan-600 border-cyan-500 text-white rounded-tr-none' : 'bg-gray-800 border-gray-700 text-gray-100 rounded-tl-none'}">
                        ${text.replace(/</g, "&lt;").replace(/>/g, "&gt;")}
                    </div>
                `;
            }
            container.appendChild(div);
            container.scrollTop = container.scrollHeight;
        }

        // Real-Time Code Sync Engine Broadcast Pipeline
        function broadcastCodeUpdate() {
            const codeVal = document.getElementById('codeTextArea').value;
            connections.forEach(c => {
                c.send({ type: 'code', code: codeVal });
            });
        }

        // Unified Workspace Navigation Module
        function switchTab(tab) {
            const btnChat = document.getElementById('tabChat');
            const btnCode = document.getElementById('tabCode');
            const panelChat = document.getElementById('panelChat');
            const panelCode = document.getElementById('panelCode');

            if(tab === 'chat') {
                btnChat.className = "flex-1 py-2 text-center text-xs font-semibold rounded-lg transition-all text-white bg-gray-800";
                btnCode.className = "flex-1 py-2 text-center text-xs font-semibold rounded-lg transition-all text-gray-400 hover:text-white";
                panelChat.classList.remove('hidden');
                panelCode.classList.add('hidden');
            } else {
                btnCode.className = "flex-1 py-2 text-center text-xs font-semibold rounded-lg transition-all text-white bg-gray-800";
                btnChat.className = "flex-1 py-2 text-center text-xs font-semibold rounded-lg transition-all text-gray-400 hover:text-white";
                panelCode.classList.remove('hidden');
                panelChat.classList.add('hidden');
            }
        }

        // Multimedia Asset Mute/Freeze Triggers
        function toggleAudio() {
            const audioTrack = localStream.getAudioTracks()[0];
            if(audioTrack) {
                audioTrack.enabled = !audioTrack.enabled;
                const path = document.getElementById('micIconPath');
                document.getElementById('micBtn').classList.toggle('bg-red-600');
                document.getElementById('micBtn').classList.toggle('bg-gray-800');
            }
        }

        function toggleVideo() {
            const videoTrack = localStream.getVideoTracks()[0];
            if(videoTrack) {
                videoTrack.enabled = !videoTrack.enabled;
                document.getElementById('camBtn').classList.toggle('bg-red-600');
                document.getElementById('camBtn').classList.toggle('bg-gray-800');
            }
        }

        // Screen Bridge (Ekran Paylaşımı) Fix Engine
        async function toggleScreenShare() {
            const screenBtn = document.getElementById('screenBtn');
            if (!screenStream) {
                try {
                    screenStream = await navigator.mediaDevices.getDisplayMedia({ video: true });
                    const track = screenStream.getVideoTracks()[0];
                    
                    // Replace video tracks for active stream interfaces across P2P lines
                    connections.forEach(c => {
                        const peerId = c.peer;
                        const senders = peer.connections[peerId];
                        if (senders) {
                            senders.forEach(pc => {
                                if(pc.peerConnection) {
                                    const sender = pc.peerConnection.getSenders().find(s => s.track.kind === 'video');
                                    if(sender) sender.replaceTrack(track);
                                }
                            });
                        }
                    });

                    document.getElementById('localVideo').srcObject = screenStream;
                    screenBtn.classList.remove('text-cyan-400');
                    screenBtn.classList.add('bg-cyan-500', 'text-white');

                    track.onended = () => stopScreenShare();
                } catch (err) {
                    console.error("Ekran paylaşımı aktivasiya xətası", err);
                }
            } else {
                stopScreenShare();
            }
        }

        function stopScreenShare() {
            if(!screenStream) return;
            screenStream.getTracks().forEach(t => t.stop());
            screenStream = null;

            const videoTrack = localStream.getVideoTracks()[0];
            connections.forEach(c => {
                const peerId = c.peer;
                const senders = peer.connections[peerId];
                if (senders) {
                    senders.forEach(pc => {
                        if(pc.peerConnection) {
                            const sender = pc.peerConnection.getSenders().find(s => s.track.kind === 'video');
                            if(sender && videoTrack) sender.replaceTrack(videoTrack);
                        }
                    });
                }
            });

            document.getElementById('localVideo').srcObject = localStream;
            const screenBtn = document.getElementById('screenBtn');
            screenBtn.classList.add('text-cyan-400');
            screenBtn.classList.remove('bg-cyan-500', 'text-white');
        }

        // Auxiliary Features
        function copyRoomId() {
            navigator.clipboard.writeText(activeRoomId);
            alert("Otaq kodu mübadilə buferinə kopyalandı!");
        }

        function disconnectCall() {
            window.location.reload();
        }

        // Initialize Native Default Target Language Settings
        changeLanguage('az');
    </script>
